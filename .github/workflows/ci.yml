name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET (8/9/10)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore SH.Framework.Library.Cqrs.Implementation.slnx

      - name: Build
        run: dotnet build SH.Framework.Library.Cqrs.Implementation.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test SH.Framework.Library.Cqrs.Implementation.slnx --configuration Release --no-build --verbosity normal
